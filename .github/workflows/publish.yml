name: Publish to NuGet

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Determine Package Version
      id: versioning
      run: |
        BASE_VERSION="1.0.0"
        if [[ ${{ github.ref }} == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
        else
          VERSION="${BASE_VERSION}-preview.${{ github.run_number }}"
        fi
        echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Restore & Build & Pack
      run: |
        dotnet restore Urzednik.sln
        dotnet build Urzednik.sln --configuration Release --no-restore
        dotnet pack Urzednik.sln --configuration Release --no-build --output ./artifacts -p:PackageVersion=${{ env.PACKAGE_VERSION }}

    - name: Push to NuGet.org via Trusted Publishing
      run: |
        # Zamiast statycznego klucza API, podajemy specjalny token systemowy GitHuba
        # NuGet.org rozpozna go automatycznie dzięki wcześniejszej konfiguracji
        dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source https://api.nuget.org/v3/index.json --skip-duplicate
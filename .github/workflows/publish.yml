name: Publish to NuGet

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Determine Package Version
      id: versioning
      run: |
        BASE_VERSION="1.0.0"
        if [[ ${{ github.ref }} == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
        else
          VERSION="${BASE_VERSION}-preview.${{ github.run_number }}"
        fi
        echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Restore & Build & Pack
      run: |
        dotnet restore OpenUrzednik.slnx
        dotnet build OpenUrzednik.slnx --configuration Release --no-restore
        dotnet pack OpenUrzednik.slnx --configuration Release --no-build --output ./artifacts -p:PackageVersion=${{ env.PACKAGE_VERSION }}

    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Push to NuGet.org
      run: |
        dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate